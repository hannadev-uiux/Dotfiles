# ~/.tmux.conf — divisão de telas no terminal (base enxuta)

# Prefixo Ctrl+a (mais confortável que o Ctrl+b padrão)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Navegação entre painéis estilo Vim (prefixo + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Dividir a tela: prefixo + |  (vertical) e prefixo + -  (horizontal)
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Qualidade de vida
set -g mouse on                 # mouse funciona (clicar/rolar/redimensionar)
set-option -g allow-rename off
set -g base-index 1             # janelas começam em 1
setw -g pane-base-index 1
set -g history-limit 10000
set -sg escape-time 0           # importante pro Neovim não ter delay no Esc

# True color (pras cores do Neovim/Dracula ficarem corretas)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
